<!DOCTYPE html>
<!-- RELEASE RULE: bump the ?v= query on style.css/core.js/views.js below on
     EVERY panel release. There is no build step and no service worker, so
     phones/PWA installs cache these assets hard — without a fresh query a
     device can render the previous version's CSS/JS against new HTML (the
     v2-CSS-on-v3-HTML mobile mis-render). One number, all three links. -->
<html lang="en">
<head>
<meta charset="utf-8">
<!-- ZOOM LOCK (admin panel only — the public pages stay zoomable): pinned
     scale keeps the app-like layout from being pinched/double-tap zoomed.
     Accessibility tradeoff accepted for an internal admin tool (low-vision
     users lose page zoom; text size prefs still apply). Note: Safari in the
     BROWSER may still allow pinch despite user-scalable=no (an iOS
     accessibility override); the installed PWA locks fully. The companion
     fix for iOS FOCUS zoom is the ≥16px mobile form-control font-size in
     style.css — small fonts on focused inputs are what trigger it. -->
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<meta name="robots" content="noindex, nofollow">
<title>Deal Tracker — Admin</title>

<!-- PWA (installable). Deliberately NO service worker: an admin panel must
     never serve stale cached state — a cached kill-switch or budget readout
     is worse than a loading spinner. Installability + icons only. -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f1420" media="(prefers-color-scheme: dark)">
<meta name="theme-color" content="#f7f8fa" media="(prefers-color-scheme: light)">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="DT Admin">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
<link rel="icon" href="/favicon.ico" sizes="any">

<link rel="stylesheet" href="style.css?v=4">
<script>
// Theme boot — runs before first paint so there is no flash. Manual choice
// (localStorage) wins; otherwise follow the system (prefers-color-scheme).
(function () {
  try {
    var saved = localStorage.getItem('dt-admin-theme');
    var theme = saved === 'light' || saved === 'dark'
      ? saved
      : (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    document.documentElement.setAttribute('data-theme', theme);
  } catch (e) {
    document.documentElement.setAttribute('data-theme', 'light');
  }
})();
</script>
</head>
<body>
  <div id="shell">
    <aside id="sidebar" aria-label="Navigation">
      <div class="side-brand">
        <img class="brand-logo" src="/android-chrome-192x192.png" alt="" width="26" height="26">
        <span class="side-brand-text">Deal Tracker <span class="side-brand-sub">Admin</span></span>
      </div>
      <nav id="sidenav" class="side-nav"></nav>
      <div class="side-foot" id="sidefoot"></div>
    </aside>
    <div id="sidebar-backdrop" hidden></div>
    <div id="main-col">
      <header id="topbar">
        <button id="nav-toggle" class="btn btn-ghost btn-icon" type="button" aria-label="Menu" hidden>☰</button>
        <!-- Top-bar brand: shown on mobile, where the sidebar brand is
             off-canvas; the desktop top bar defers to the sidebar's. -->
        <span class="topbar-brand">
          <img class="brand-logo" src="/android-chrome-192x192.png" alt="" width="22" height="22">
          <span class="topbar-brand-text">Deal Tracker <span class="side-brand-sub">Admin</span></span>
        </span>
        <button id="search-open" class="search-fake" type="button" hidden>
          <span class="search-fake-icon" aria-hidden="true">⌕</span>
          <span class="search-fake-label">Search users &amp; deals…</span>
          <kbd class="search-fake-kbd">⌘K</kbd>
        </button>
        <div class="topbar-spacer"></div>
        <button id="theme-toggle" class="btn btn-ghost btn-icon" type="button" title="Toggle light / dark" hidden>◐</button>
        <button id="signout" class="btn btn-ghost" type="button" hidden>Sign out</button>
      </header>
      <main id="app">
        <p class="boot-msg">Loading…</p>
      </main>
    </div>
  </div>
  <div id="toasts" aria-live="polite"></div>
  <div id="layer"></div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="core.js?v=4"></script>
  <script src="views.js?v=5"></script>
</body>
</html>
